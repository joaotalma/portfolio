name: Atualizar relatório macro

# Roda todo dia 1º às 09:00 (BRT = 12:00 UTC) e também manualmente
on:
  schedule:
    - cron: "0 12 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install pandas openpyxl

      - name: Gerar relatório com dados atualizados do BCB
        run: python projetos/relatorio-macro-excel/gerar_relatorio.py

      - name: Commitar relatório atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projetos/relatorio-macro-excel/relatorio_macro.xlsx projetos/relatorio-macro-excel/data/
          git diff --cached --quiet || git commit -m "chore: atualiza relatório macro ($(date +%Y-%m))"
          git push
